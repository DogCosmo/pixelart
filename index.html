<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pixel Art Studio</title>
        <style>
            body
            {
                margin : 0;
                font-family: Times New Roman, serif;
                background-color: #e3e3e6;
            }
            .toolbar
            {
                position: sticky;
                top:0;
                background: white;
                padding: 12px;
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                align-items:center;
                z-index:10;
            }

            .toolbar h2
            {
                margin:0;
                font-size:18px;
            }
            
            #grid
            {
                width:min(90vmin, 800px);
                height:min(90vmin, 800px);
                margin: 20px auto;
                display:grid;
                background:white;
                border: 1px solid #ccc;
                cursor: crosshair;
                user-select:none;
            }

            .pixel
            {
                border: 1px solid #eee;
                box-sizing: border-box;
            }

            button
            {
                cursor: pointer;
                padding: 8px 12px;
                border: 1px solid #ccc;
                border-radius:4px;
                background: white;
                font-size: 14px;
            }

            button:hover
            {
                background: #eee;
            }

            button.active
            {
                background: #ddd;
                font-weight: bold;
            }

            select
            {
                padding: 7px 10px;
                font-size:14px;
                border:1px solid #ccc;
                border-radius: 4px;
            }
        </style>
    </head>
    <body>
        <div class="toolbar">
            <h2>Pixel Art Studio</h2>
            <input type="color" id="colorPicker" value="#000000">
            <button id="eraser">Eraser</button>
            <button id="bucket">Bucket</button>
            <button id="undo">Undo</button>
            <button id="clear">Clear</button>
            <button id="save">Save</button>
            <button id="load">Load</button>
            <button id="export">Export</button>
            <select id="gridSize">
                <option value ="16">16x16</option>
                <option value ="32" selected>32x32</option>
                <option value ="64">64x64</option>
            </select>
        </div>

        <div id="grid"></div>

        <script> 
            const grid = document.getElementById('grid');
            const colorPicker = document.getElementById('colorPicker');
            let currentColor = '#000000';
            let size = 32;
            let drawing = false;
            let bucketMode = false;
            let eraserMode = false;
            const history = [];
            function saveState()
            {
                history.push(getGridData());
                if (history.length > 50) history.shift();
            }
            function getPixels()
            {
                return [...grid.querySelectorAll('.pixel')];
            }
            function getGridData()
            {
                return getPixels().map(p => p.style.backgroundColor || 'white');
            }
            function loadGridData(data)
            {
                getPixels().forEach((p,i) =>
                {
                p.style.backgroundColor = data[i] || 'white';
                });
            }
            function createGrid(n)
            {
                size = n;
                grid.innerHTML = ";"
                grid.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
                grid.style.gridTemplateRows    = `repeat(${n}, 1fr)`;
                for (let i = 0; i < n * n; i++ )
                {
                    const pixel = document.createElement('div');
                    pixel.className = 'pixel';
                    grid.appendChild(pixel);
                }
                history.length = 0;
                saveState();
            }
            function getPixelAt(clientX, clientY)
            {
                const els = document.elementsFromPoint(clientX,clientY);
                return els.find(el => el.classList.contains('pixel')) || null;
            }
            function paint(pixel)
            {
                if(bucketMode)
                {
                    const pixels = getPixels();
                    floodFill(
                        pixels.indexOf(pixel),
                        pixel.style.backgroundColor || 'white',
                        currentColor
                    );
                    saveState();
                    return;
                }
                pixel.style.backgroundColor = eraserMode ? 'white' : currentColor;
            }
            
            function floodFill(start, target, newColor)
            {
                if(target == newColor) return;
                const pixels = getPixels();
                const stack = [start];
                while (stack.length)
                {
                    const cur = stack.pop();
                    const px = pixels[cur];
                    if((px.style.backgroundColor || 'white') != target) continue;
                    px.style.backgroundColor = newColor;
                    const x = cur%size;
                    const y = Math.floor(cur/size);
                    if(x>0) stack.push(cur-1)
                    if(x<size-1) stack.push(cur+1)
                    if(y>0) stack.push(cur-size);
                    if(y< size - 1) stack.push(cur+size);
                }
            }
            
            grid.addEventListener('mousedown', e=>
            {
                e.preventDefault();
                drawing=true;
                const px = getPixelAt(e.clientX, e.clientY);
                if (px) paint(px);
            });  
            
            grid.addEventListener('mousemove', e=>
            {
                if(!drawing || bucketMode) return;
                const px = getPixelAt(e.clientX,e.clientY);
                if (px) paint(px);
            });

            document.addEventListener('mouseup', () =>
            {
                if(drawing && !bucketMode) saveState();
                drawing = false;
            });
            
            grid.addEventListener('touchstart', e=>
            {
                e.preventDefault();
                drawing = true;
                const t = e.touches[0];
                const px = document.elementFromPoint(t.clientX, t.clientY);
                if(px && px.classList.contains('pixel')) paint(px);
            }, { passive: false });
            
            grid.addEventListener('touchmove', e=>
            {
                e.preventDefault();
                if(!drawing || bucketMode) return;
                const t = e.touches[0];
                const px = document.elementFromPoint(t.clientX, t.clientY);
                if(px && px.classList.contains('pixel')) paint(px);
            }, { passive: false });
            

        </script>
    </body>
</html>
